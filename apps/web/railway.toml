[build]
builder = "nixpacks"
buildCommand = "npm run build || ([ -d '.next/server/app' ] && echo 'WARNING: /_global-error prerender failed (Next.js 16 known bug) - build is functional' || exit 1)"

[build.env]
NIXPACKS_NODE_VERSION = "20"

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
